version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"
    depends_on:
      mysql:
        condition: service_healthy

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_started

  user-service:
    build: ./user-service
    ports:
      - "8081:8081"
    depends_on:
      eureka-server:
        condition: service_started
      mysql:
        condition: service_healthy

  post-service:
    build: ./post-service
    ports:
      - "8082:8082"
    depends_on:
      eureka-server:
        condition: service_started
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started

  comment-service:
    build: ./comment-service
    ports:
      - "8083:8083"
    depends_on:
      eureka-server:
        condition: service_started
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started

  like-dislike-service:
    build: ./like-dislike-service
    ports:
      - "8084:8084"
    depends_on:
      eureka-server:
        condition: service_started
      mysql:
        condition: service_healthy
