                            - text: ":"
                          - paragraph [ref=e1005]:
                            - img "Update PostgreSQL storage in the Render Dashboard" [ref=e1007]
                        - listitem [ref=e1008]:
                          - paragraph [ref=e1009]:
                            - text: Scroll down to the
                            - strong [ref=e1010]: Storage
                            - text: field and provide a new value.
                          - list [ref=e1011]:
                            - listitem [ref=e1012]: Provide any multiple of 5 GB greater than the current storage capacity.
                        - listitem [ref=e1013]:
                          - paragraph [ref=e1014]:
                            - text: Click
                            - strong [ref=e1015]: Save Changes
                            - text: .
                      - paragraph [ref=e1016]: That's it! The additional storage becomes available within a minute or two.
                  - heading "Running out of storage" [level=3] [ref=e1017]:
                    - link [ref=e1018] [cursor=pointer]:
                      - /url: "#running-out-of-storage"
                      - img [ref=e1019]
                    - text: Running out of storage
                  - paragraph [ref=e1021]:
                    - strong [ref=e1022]: If your database exceeds its storage limit, it becomes unhealthy.
                    - text: Render automatically suspends the database to prevent data loss or other unexpected behavior.
                  - paragraph [ref=e1023]: "To restore your database:"
                  - list [ref=e1024]:
                    - listitem [ref=e1025]:
                      - paragraph [ref=e1026]:
                        - text: In the
                        - link "Render Dashboard" [ref=e1027] [cursor=pointer]:
                          - /url: https://dashboard.render.com
                        - text: ", scroll to the bottom of your database's"
                        - strong [ref=e1028]: Info
                        - text: page and click
                        - strong [ref=e1029]: Resume Database
                        - text: .
                    - listitem [ref=e1030]:
                      - paragraph [ref=e1031]: Wait a minute or two for the database to finish resuming.
                    - listitem [ref=e1032]:
                      - paragraph [ref=e1033]:
                        - text: Follow the steps to
                        - link "manually add storage capacity" [ref=e1034] [cursor=pointer]:
                          - /url: "#increasing-storage-manually"
                        - text: .
                      - list [ref=e1035]:
                        - listitem [ref=e1036]: If you wait too long after resuming, Render will suspend your database again. In this case, return to step 1.
                  - paragraph [ref=e1037]: Your database will become healthy within a few minutes.
                  - heading "Changing your instance type" [level=2] [ref=e1038]:
                    - link [ref=e1039] [cursor=pointer]:
                      - /url: "#changing-your-instance-type"
                      - img [ref=e1040]
                    - text: Changing your instance type
                  - paragraph [ref=e1042]:
                    - text: You can change your Render Postgres database's instance type, which determines its available RAM and CPU.
                    - link "View available instance types" [ref=e1043] [cursor=pointer]:
                      - /url: /docs/compute-plans?tab=postgres#available-instance-types
                    - text: .
                  - generic [ref=e1044]:
                    - paragraph [ref=e1045]:
                      - strong [ref=e1046]: Your database will be unavailable temporarily during the change.
                    - list [ref=e1047]:
                      - listitem [ref=e1048]:
                        - text: With
                        - link "high availability" [ref=e1049] [cursor=pointer]:
                          - /url: /docs/postgresql-high-availability
                        - text: enabled, your database is unavailable for only a few seconds.
                      - listitem [ref=e1050]: Otherwise, it's unavailable for a few minutes.
                    - paragraph [ref=e1051]: Schedule your change during off hours to minimize user impact.
                  - list [ref=e1052]:
                    - listitem [ref=e1053]:
                      - paragraph [ref=e1054]:
                        - text: From your database's
                        - strong [ref=e1055]: Info
                        - text: page in the
                        - link "Render Dashboard" [ref=e1056] [cursor=pointer]:
                          - /url: https://dashboard.render.com
                        - text: ", scroll down to the"
                        - strong [ref=e1057]: PostgreSQL Instance
                        - text: section and click
                        - strong [ref=e1058]: Update
                        - text: ":"
                      - paragraph [ref=e1060]:
                        - img "Update Postgres instance type in the Render Dashboard" [ref=e1062]
                    - listitem [ref=e1063]:
                      - paragraph [ref=e1064]:
                        - text: Under
                        - strong [ref=e1065]: Plan Options
                        - text: ", select a new"
                        - strong [ref=e1066]: Instance Type
                        - text: .
                      - list [ref=e1067]:
                        - listitem [ref=e1068]:
                          - text: If your database currently uses a
                          - link "legacy instance type" [ref=e1069] [cursor=pointer]:
                            - /url: /docs/postgresql-legacy-instance-types
                          - text: ", you won't be able to move"
                          - emphasis [ref=e1070]: back
                          - text: to a legacy instance type after changing.
                    - listitem [ref=e1071]:
                      - paragraph [ref=e1072]:
                        - text: Click
                        - strong [ref=e1073]: Save Changes
                        - text: .
                  - paragraph [ref=e1074]: That's it! Your new instance will be available within a few minutes.
                  - heading "Adding multiple databases to a single instance" [level=2] [ref=e1075]:
                    - link [ref=e1076] [cursor=pointer]:
                      - /url: "#adding-multiple-databases-to-a-single-instance"
                      - img [ref=e1077]
                    - text: Adding multiple databases to a single instance
                  - paragraph [ref=e1079]: "You can create additional databases in your Render Postgres instance with the following steps:"
                  - list [ref=e1080]:
                    - listitem [ref=e1081]:
                      - paragraph [ref=e1082]:
                        - text: In your terminal, open a psql session to your instance using the
                        - strong [ref=e1083]: PSQL Command
                        - text: provided in the
                        - link "Render Dashboard" [ref=e1084] [cursor=pointer]:
                          - /url: https://dashboard.render.com
                        - text: ":"
                      - paragraph [ref=e1086]:
                        - img "Postgres public connection details in the Render Dashboard" [ref=e1088]
                    - listitem [ref=e1089]:
                      - paragraph [ref=e1090]:
                        - text: Run
                        - code [ref=e1091]: CREATE DATABASE <name>
                        - text: ", providing the name for your new database."
                  - paragraph [ref=e1092]: "You're all set! Use your instance's same internal and external URLs to connect, except substitute your new database's name as the final component:"
                  - generic [ref=e1093]:
                    - generic [ref=e1095]:
                      - generic [ref=e1096]: plaintext
