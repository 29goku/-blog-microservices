                        - generic [ref=e1098]: Copy to clipboard
                        - img [ref=e1099]
                    - generic [ref=e1104]: postgresql://USER:PASSWORD@INTERNAL_HOST:PORT/DATABASE
                  - heading "Encryption" [level=2] [ref=e1105]:
                    - link [ref=e1106] [cursor=pointer]:
                      - /url: "#encryption"
                      - img [ref=e1107]
                    - text: Encryption
                  - paragraph [ref=e1109]:
                    - text: Render Postgres databases are encrypted at rest using AES-256 data encryption. This encryption applies to both primary and replica instances, along with all backups.
                    - link "External connections" [ref=e1110] [cursor=pointer]:
                      - /url: "#external-connections"
                    - text: to your database are encrypted in transit using Render-managed TLS certificates.
                  - heading "Metrics and logs" [level=2] [ref=e1111]:
