spring:
  application:
    name: post-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/blog_post_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  autoconfigure:
    exclude: org.springframework.cloud.stream.binder.kafka.config.KafkaBinderConfiguration

server:
  port: ${PORT:8082}

logging:
  level:
    root: INFO
    com.blog: DEBUG

feign:
  client:
    config:
      user-service:
        connect-timeout: 5000
        read-timeout: 5000
        logger-level: full

resilience4j:
  circuitbreaker:
    instances:
      post-service:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 2s
        recordExceptions:
          - java.io.IOException
          - feign.FeignException
      user-service:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 2s
        recordExceptions:
          - java.io.IOException
          - feign.FeignException

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://eureka-server:8761/eureka/}
  instance:
    prefer-ip-address: true
