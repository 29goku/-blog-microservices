spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: ${GATEWAY_DISCOVERY_ENABLED:false}
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:lb://user-service}
          predicates:
            - Path=/api/users/**
        - id: post-service
          uri: ${POST_SERVICE_URL:lb://post-service}
          predicates:
            - Path=/api/posts/**
        - id: comment-service
          uri: ${COMMENT_SERVICE_URL:lb://comment-service}
          predicates:
            - Path=/api/comments/**
        - id: like-dislike-service
          uri: ${LIKE_DISLIKE_SERVICE_URL:lb://like-dislike-service}
          predicates:
            - Path=/api/likedislike/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: GET,POST,PUT,DELETE,OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

server:
  port: ${PORT:8080}

logging:
  level:
    root: INFO
    com.blog: DEBUG
    org.springframework.cloud.gateway: DEBUG

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    register-with-eureka: ${EUREKA_REGISTER:true}
    fetch-registry: ${EUREKA_FETCH:true}
    service-url:
      defaultZone: ${EUREKA_URI:http://eureka-server:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        # Expose gateway actuator so we can introspect loaded routes
        # in production: GET /actuator/gateway/routes
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true
  health:
    # Don't fail /actuator/health when Eureka is unreachable / disabled
    defaults:
      enabled: true
    discoveryClient:
      enabled: false


