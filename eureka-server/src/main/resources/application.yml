spring:
  application:
    name: eureka-server

server:
  port: ${PORT:8761}

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:${PORT:8761}/eureka/
  server:
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 60000

management:
  endpoints:
    web:
      exposure:
        include: "*"
