databases:
  - name: blog-user-db
    databaseName: blog_user_db
    plan: free

  - name: blog-post-db
    databaseName: blog_post_db
    plan: free

  - name: blog-comment-db
    databaseName: blog_comment_db
    plan: free

  - name: like-dislike-db
    databaseName: like_dislike_db
    plan: free

services:
  # ─────────────────────────────────────────
  # Eureka Service Discovery
  # ─────────────────────────────────────────
  - type: web
    name: eureka-server
    runtime: docker
    dockerfilePath: ./eureka-server/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8761

  # ─────────────────────────────────────────
  # API Gateway
  # ─────────────────────────────────────────
  - type: web
    name: api-gateway
    runtime: docker
    dockerfilePath: ./api-gateway/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8080
      - key: EUREKA_URI
        sync: false

  # ─────────────────────────────────────────
  # User Service
  # ─────────────────────────────────────────
  - type: web
    name: user-service
    runtime: docker
    dockerfilePath: ./user-service/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8081
      - key: DB_URL
        fromDatabase:
          name: blog-user-db
          property: jdbcUrl
      - key: DB_USERNAME
        fromDatabase:
          name: blog-user-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: blog-user-db
          property: password
      - key: EUREKA_URI
        sync: false

  # ─────────────────────────────────────────
  # Post Service
  # ─────────────────────────────────────────
  - type: web
    name: post-service
    runtime: docker
    dockerfilePath: ./post-service/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8082
      - key: DB_URL
        fromDatabase:
          name: blog-post-db
          property: jdbcUrl
      - key: DB_USERNAME
        fromDatabase:
          name: blog-post-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: blog-post-db
          property: password
      - key: EUREKA_URI
        sync: false

  # ─────────────────────────────────────────
  # Comment Service
  # ─────────────────────────────────────────
  - type: web
    name: comment-service
    runtime: docker
    dockerfilePath: ./comment-service/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8083
      - key: DB_URL
        fromDatabase:
          name: blog-comment-db
          property: jdbcUrl
      - key: DB_USERNAME
        fromDatabase:
          name: blog-comment-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: blog-comment-db
          property: password
      - key: EUREKA_URI
        sync: false

  # ─────────────────────────────────────────
  # Like-Dislike Service
  # ─────────────────────────────────────────
  - type: web
    name: like-dislike-service
    runtime: docker
    dockerfilePath: ./like-dislike-service/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8084
      - key: DB_URL
        fromDatabase:
          name: like-dislike-db
          property: jdbcUrl
      - key: DB_USERNAME
        fromDatabase:
          name: like-dislike-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: like-dislike-db
          property: password
      - key: EUREKA_URI
        sync: false
