databases:
  - name: blog-user-db
    databaseName: blog_user_db
    plan: free

  - name: blog-post-db
    databaseName: blog_post_db
    plan: free

  - name: blog-comment-db
    databaseName: blog_comment_db
    plan: free

  - name: like-dislike-db
    databaseName: like_dislike_db
    plan: free

services:
  # ─────────────────────────────────────────
  # Eureka Service Discovery
  # ─────────────────────────────────────────
  - type: web
    name: eureka-server
    runtime: docker
    dockerfilePath: ./eureka-server/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8761

  # ─────────────────────────────────────────
  # API Gateway
  # ─────────────────────────────────────────
  - type: web
    name: api-gateway
    runtime: docker
    dockerfilePath: ./api-gateway/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8080
      # Eureka is unusable across separate Render services (each gets its own
      # public hostname and Eureka registers internal IPs). Disable it and use
      # direct service URLs below.
      - key: EUREKA_CLIENT_ENABLED
        value: "false"
      - key: EUREKA_REGISTER
        value: "false"
      - key: EUREKA_FETCH
        value: "false"
      - key: GATEWAY_DISCOVERY_ENABLED
        value: "false"
      - key: USER_SERVICE_URL
        value: https://user-service.onrender.com
      - key: POST_SERVICE_URL
        value: https://post-service.onrender.com
      - key: COMMENT_SERVICE_URL
        value: https://comment-service.onrender.com
      - key: LIKE_DISLIKE_SERVICE_URL
        value: https://like-dislike-service.onrender.com

  # ─────────────────────────────────────────
  # User Service
  # ─────────────────────────────────────────
  - type: web
    name: user-service
    runtime: docker
    dockerfilePath: ./user-service/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8081
      - key: DB_HOST
        fromDatabase:
          name: blog-user-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: blog-user-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: blog-user-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: blog-user-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: blog-user-db
          property: password
      - key: EUREKA_CLIENT_ENABLED
        value: "false"
      - key: EUREKA_REGISTER
        value: "false"
      - key: EUREKA_FETCH
        value: "false"

  # ─────────────────────────────────────────
  # Post Service
  # ─────────────────────────────────────────
  - type: web
    name: post-service
    runtime: docker
    dockerfilePath: ./post-service/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8082
      - key: DB_HOST
        fromDatabase:
          name: blog-post-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: blog-post-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: blog-post-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: blog-post-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: blog-post-db
          property: password
      - key: EUREKA_CLIENT_ENABLED
        value: "false"
      - key: EUREKA_REGISTER
        value: "false"
      - key: EUREKA_FETCH
        value: "false"
      - key: USER_SERVICE_URL
        value: https://user-service.onrender.com

  # ─────────────────────────────────────────
  # Comment Service
  # ─────────────────────────────────────────
  - type: web
    name: comment-service
    runtime: docker
    dockerfilePath: ./comment-service/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8083
      - key: DB_HOST
        fromDatabase:
          name: blog-comment-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: blog-comment-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: blog-comment-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: blog-comment-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: blog-comment-db
          property: password
      - key: EUREKA_CLIENT_ENABLED
        value: "false"
      - key: EUREKA_REGISTER
        value: "false"
      - key: EUREKA_FETCH
        value: "false"
      - key: USER_SERVICE_URL
        value: https://user-service.onrender.com
      - key: POST_SERVICE_URL
        value: https://post-service.onrender.com

  # ─────────────────────────────────────────
  # Like-Dislike Service
  # ─────────────────────────────────────────
  - type: web
    name: like-dislike-service
    runtime: docker
    dockerfilePath: ./like-dislike-service/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8084
      - key: DB_HOST
        fromDatabase:
          name: like-dislike-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: like-dislike-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: like-dislike-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: like-dislike-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: like-dislike-db
          property: password
      - key: EUREKA_CLIENT_ENABLED
        value: "false"
      - key: EUREKA_REGISTER
        value: "false"
      - key: EUREKA_FETCH
        value: "false"
      - key: USER_SERVICE_URL
        value: https://user-service.onrender.com
      - key: POST_SERVICE_URL
        value: https://post-service.onrender.com
